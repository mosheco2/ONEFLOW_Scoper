        // --- COMPONENTS ---

        const FeatureItem = ({ feature, isSelected, onToggle, isDisabled }) => {
          return (
            <div 
              onClick={() => !isDisabled && onToggle(feature.id)}
              className={`
                relative flex items-start p-3 rounded-lg border transition-all cursor-pointer select-none mb-2
                ${isDisabled ? 'opacity-40 bg-slate-100 cursor-not-allowed border-slate-200' : 
                  isSelected ? 'bg-cyan-50 border-cyan-500 shadow-sm' : 'bg-white border-slate-200 hover:border-cyan-300'}
              `}
            >
              <div className={`
                mt-0.5 ml-3 w-5 h-5 rounded border flex items-center justify-center transition-colors shrink-0
                ${isSelected ? 'bg-cyan-500 border-cyan-500' : 'bg-white border-slate-300'}
              `}>
                {isSelected && <Icons.CheckCircle size={14} className="text-white" />}
              </div>
              
              <div className="flex-1">
                <div className="flex items-center justify-between">
                  <span className={`font-medium text-sm ${isSelected ? 'text-cyan-900' : 'text-slate-700'}`}>
                    {feature.name}
                  </span>
                  <div className="flex gap-1">
                    {feature.core && (
                      <span className="text-[10px] bg-slate-800 text-white px-1.5 py-0.5 rounded font-bold tracking-wide">CORE</span>
                    )}
                    {feature.highEffort && (
                      <span className="text-[10px] bg-amber-100 text-amber-700 px-1.5 py-0.5 rounded font-bold tracking-wide border border-amber-200 flex items-center gap-0.5">
                         HIGH EFFORT
                      </span>
                    )}
                  </div>
                </div>
                <p className="text-xs text-slate-500 mt-1 leading-relaxed">
                  {feature.sow}
                </p>
              </div>
            </div>
          );
        };

        const App = () => {
          // State
          const [businessType, setBusinessType] = useState('B2B'); // B2B | B2C
          const [selectedFeatures, setSelectedFeatures] = useState(new Set());
          const [viewMode, setViewMode] = useState('SOW'); // SOW | TECH
          const [filterMode, setFilterMode] = useState('ALL'); // ALL | STANDARD | CUSTOM
          const [expandedModules, setExpandedModules] = useState({});
          
          // Custom Processes State
          const [rawTopics, setRawTopics] = useState('');
          const [customTopics, setCustomTopics] = useState([]);

          // Init expanded state
          useEffect(() => {
              const initialExpanded = {};
              SYSTEM_DATA.B2B.forEach(m => initialExpanded[m.id] = true);
              SYSTEM_DATA.B2C.forEach(m => initialExpanded[m.id] = true);
              initialExpanded['custom_processes'] = true; // Open the custom processes accordion by default
              setExpandedModules(initialExpanded);
          }, []);

          // Reset selection when business type changes
          const handleBusinessTypeChange = (type) => {
            setBusinessType(type);
            setSelectedFeatures(new Set());
          };

          const toggleFeature = (featureId, conflicts = []) => {
            const nextSelected = new Set(selectedFeatures);
            
            if (nextSelected.has(featureId)) {
              nextSelected.delete(featureId);
            } else {
              nextSelected.add(featureId);
              if (conflicts && conflicts.length > 0) {
                conflicts.forEach(conflictId => nextSelected.delete(conflictId));
              }
            }
            setSelectedFeatures(nextSelected);
          };

          const toggleModule = (modId) => {
            setExpandedModules(prev => ({
                ...prev,
                [modId]: !prev[modId]
            }));
          };

          // --- Custom Processes Handlers ---
          const handleAddTopics = () => {
            const topics = rawTopics.split('\n').map(t => t.trim()).filter(t => t);
            if (topics.length === 0) return;

            const newTopics = topics.map((t, i) => ({
                id: `topic_${Date.now()}_${i}`,
                title: t,
                rows: [
                    {
                        id: `row_${Date.now()}_${i}_0`,
                        user: '',
                        action: '',
                        apiEndpoint: '',
                        current: '',
                        desired: '',
                        notes: '',
                        isCustom: false,
                        isCore: false,
                        isHighEffort: false
                    }
                ]
            }));

            setCustomTopics([...customTopics, ...newTopics]);
            setRawTopics('');
          };

          const handleTopicUpdate = (topicId, newTitle) => {
              setCustomTopics(prev => prev.map(t => t.id === topicId ? { ...t, title: newTitle } : t));
          };

          const handleAddRow = (topicId) => {
              setCustomTopics(prev => prev.map(t => {
                  if (t.id === topicId) {
                      return {
                          ...t,
                          rows: [...t.rows, {
                              id: `row_${Date.now()}_${Math.random()}`,
                              user: '',
                              action: '',
                              apiEndpoint: '',
                              current: '',
                              desired: '',
                              notes: '',
                              isCustom: false,
                              isCore: false,
                              isHighEffort: false
                          }]
                      };
                  }
                  return t;
              }));
          };

          const handleRowUpdate = (topicId, rowId, field, value) => {
              setCustomTopics(prev => prev.map(t => {
                  if (t.id === topicId) {
                      return {
                          ...t,
                          rows: t.rows.map(r => r.id === rowId ? { ...r, [field]: value } : r)
                      };
                  }
                  return t;
              }));
          };

          const handleRemoveRow = (topicId, rowId) => {
              setCustomTopics(prev => prev.map(t => {
                  if (t.id === topicId) {
                      return { ...t, rows: t.rows.filter(r => r.id !== rowId) };
                  }
                  return t;
              }).filter(t => t.rows.length > 0)); // Remove topic entirely if no rows left
          };

          const handleMoveRow = (topicId, rowIndex, direction) => {
              setCustomTopics(prev => prev.map(t => {
                  if (t.id === topicId) {
                      const newRows = [...t.rows];
                      if (direction === 'up' && rowIndex > 0) {
                          [newRows[rowIndex - 1], newRows[rowIndex]] = [newRows[rowIndex], newRows[rowIndex - 1]];
                      } else if (direction === 'down' && rowIndex < newRows.length - 1) {
                          [newRows[rowIndex + 1], newRows[rowIndex]] = [newRows[rowIndex], newRows[rowIndex + 1]];
                      }
                      return { ...t, rows: newRows };
                  }
                  return t;
              }));
          };

          const currentModules = SYSTEM_DATA[businessType];

          const stats = useMemo(() => {
            let complexity = 0;
            let apiCount = 0;
            let selectedList = [];
            let combinedEndpoints = [];

            // Standard features
            currentModules.forEach(mod => {
              mod.personas.forEach(persona => {
                persona.features.forEach(feat => {
                  if (selectedFeatures.has(feat.id)) {
                    complexity += feat.complexity;
                    if (feat.tech && !feat.tech.includes('Middleware') && !feat.tech.includes('Algorithm')) {
                        apiCount++;
                        combinedEndpoints.push({ id: feat.id, tech: feat.tech, name: feat.name });
                    }
                    selectedList.push({ ...feat, moduleName: mod.name, personaName: persona.name });
                  }
                });
              });
            });

            // Custom rows calculations
            const allCustomRows = customTopics.flatMap(t => t.rows);
            
            allCustomRows.forEach(row => {
                // Base complexity per custom row
                let rowComplexity = 2;
                if (row.isHighEffort) rowComplexity += 10;
                if (row.isCore) rowComplexity += 3;
                complexity += rowComplexity;

                // API Endpoint calculation
                if (row.apiEndpoint && row.apiEndpoint.trim() !== '') {
                    apiCount++;
                    combinedEndpoints.push({ id: row.id, tech: row.apiEndpoint, name: row.action || 'תהליך מותאם אישית' });
                }
            });

            const totalItems = selectedList.length + allCustomRows.length;
            const customItemsCount = allCustomRows.filter(r => r.isCustom).length;
            const customPercent = totalItems > 0 ? (customItemsCount / totalItems) * 100 : 0;

            return { 
                complexity, 
                apiCount, 
                featureCount: selectedList.length, 
                selectedList,
                totalItems,
                customItemsCount,
                customPercent,
                combinedEndpoints
            };
          }, [selectedFeatures, currentModules, customTopics]);

          const complexityLevel = useMemo(() => {
              if (stats.complexity < 15) return { label: 'LOW', color: 'text-green-600', bg: 'bg-green-100' };
              if (stats.complexity < 40) return { label: 'MEDIUM', color: 'text-amber-600', bg: 'bg-amber-100' };
              return { label: 'HIGH', color: 'text-red-600', bg: 'bg-red-100' };
          }, [stats.complexity]);

          const techSpecJson = useMemo(() => {
              const manifest = {
                  projectType: businessType,
                  modules: [],
                  complexityScore: stats.complexity,
                  apiEndpoints: [],
                  customTopics: customTopics
              };

              const moduleMap = {};

              stats.selectedList.forEach(feat => {
                  if (!moduleMap[feat.moduleName]) {
                      moduleMap[feat.moduleName] = { name: feat.moduleName, features: [] };
                  }
                  moduleMap[feat.moduleName].features.push({
                      key: feat.id,
                      name: feat.name,
                      spec: feat.tech
                  });
              });
              
              stats.combinedEndpoints.forEach(ep => {
                  manifest.apiEndpoints.push(ep.tech);
              });

              manifest.modules = Object.values(moduleMap);
              return JSON.stringify(manifest, null, 2);
          }, [stats, businessType, customTopics]);

          const isExceedingCustomPercent = stats.customPercent > 5;

          // --- EXPORT TO EXCEL (CSV) ---
          const handleExportExcel = () => {
              const rows = [];
              
              // Helper to escape CSV values
              const escapeCsv = (val) => {
                  if (val === null || val === undefined) return '""';
                  const str = String(val);
                  return `"${str.replace(/"/g, '""')}"`;
              };

              // --- Section 1: Standard Features ---
              rows.push(['חלק א: תכולת מערכת (סטנדרט)']);
              rows.push(['מודול', 'פרסונה', 'שם פיצ\'ר', 'תכולה (SOW)', 'מפרט טכני', 'מורכבות', 'Core', 'High Effort']);
              
              stats.selectedList.forEach(item => {
                  rows.push([
                      escapeCsv(item.moduleName),
                      escapeCsv(item.personaName),
                      escapeCsv(item.name),
                      escapeCsv(item.sow),
                      escapeCsv(item.tech),
                      item.complexity,
                      item.core ? 'כן' : 'לא',
                      item.highEffort ? 'כן' : 'לא'
                  ]);
              });

              rows.push([]);
              rows.push([]);

              // --- Section 2: Custom Processes ---
              if (customTopics.length > 0) {
                  rows.push(['חלק ב: ניתוח תהליכים (Gap Analysis)']);
                  rows.push(['נושא התהליך', 'משתמש', 'פעולה (מה קורה)', 'ממשק API', 'מצב מצוי', 'מצב רצוי', 'הערות', 'סוג תכולה', 'Core', 'High Effort']);
                  
                  customTopics.forEach(topic => {
                      topic.rows.forEach(row => {
                          rows.push([
                              escapeCsv(topic.title || 'נושא ללא שם'),
                              escapeCsv(row.user),
                              escapeCsv(row.action),
                              escapeCsv(row.apiEndpoint),
                              escapeCsv(row.current),
                              escapeCsv(row.desired),
                              escapeCsv(row.notes),
                              row.isCustom ? 'התאמה אישית' : 'מובנה במוצר',
                              row.isCore ? 'כן' : 'לא',
                              row.isHighEffort ? 'כן' : 'לא'
                          ]);
                      });
                  });
              }

              // Add BOM for Hebrew support in Excel
              const BOM = '\uFEFF';
              const csvContent = BOM + rows.map(e => e.join(',')).join('\n');

              // Create Download Link
              const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
              const url = URL.createObjectURL(blob);
              const link = document.createElement('a');
              link.href = url;
              const dateStr = new Date().toISOString().split('T')[0];
              link.setAttribute('download', `ONEFLOW_Scoper_Export_${dateStr}.csv`);
              document.body.appendChild(link);
              link.click();
              document.body.removeChild(link);
          };

          return (
            <div className="flex flex-col h-full">
              
              {/* Header */}
              <header className="bg-slate-900 text-white p-4 shadow-md flex justify-between items-center z-10 shrink-0 no-print">
                <div className="flex items-center gap-3">
                    <div className="w-8 h-8 rounded bg-cyan-500 flex items-center justify-center font-bold text-lg">O</div>
                    <div>
                        <h1 className="text-lg font-bold leading-none">ONEFLOW 360 PRO</h1>
                        <span className="text-xs text-slate-400">Scoping & Sales Tool v2.0</span>
                    </div>
                </div>
                <div className="flex gap-2">
                    <button onClick={handleExportExcel} className="flex items-center gap-2 px-3 py-1.5 text-xs bg-green-700 hover:bg-green-600 rounded border border-green-600 transition-colors">
                        <Icons.Download size={14} />
                        ייצוא לאקסל
                    </button>
                    <button className="px-3 py-1.5 text-xs bg-slate-800 hover:bg-slate-700 rounded border border-slate-700 transition-colors">
                        שמור טיוטה
                    </button>
                    <button onClick={() => window.print()} className="px-3 py-1.5 text-xs bg-cyan-600 hover:bg-cyan-500 rounded font-medium transition-colors">
                        הדפס PDF
                    </button>
                </div>
              </header>

              {/* Main Content */}
              <div className="flex flex-1 overflow-hidden">
                
                {/* RIGHT PANEL: CONFIGURATOR (Input) */}
                <div className="w-1/2 flex flex-col border-l border-slate-200 bg-white shadow-xl z-10 no-print">
                    
                    {/* Top Config Controls */}
                    <div className="p-6 border-b border-slate-100 bg-white">
                        <h2 className="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-3">סוג פעילות</h2>
                        <div className="flex gap-3">
                            {['B2B', 'B2C'].map(type => (
                                <button
                                    key={type}
                                    onClick={() => handleBusinessTypeChange(type)}
                                    className={`
                                        flex-1 py-3 rounded-lg border-2 text-center font-bold transition-all
                                        ${businessType === type 
                                            ? 'border-cyan-500 bg-cyan-50 text-cyan-900 shadow-sm' 
                                            : 'border-slate-200 text-slate-400 hover:border-slate-300'}
                                    `}
                                >
                                    {type === 'B2B' ? 'סיטונאות והפצה (B2B)' : 'קמעונאות (B2C)'}
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Modules List */}
                    <div className="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-50/50">
                        
                        {/* Custom Processes Accordion (NEW) */}
                        <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden mb-4 border-t-4 border-t-purple-500">
                            <button 
                                onClick={() => toggleModule('custom_processes')}
                                className="w-full flex items-center justify-between p-4 bg-white hover:bg-slate-50 transition-colors"
                            >
                                <div className="flex items-center gap-3">
                                    <div className="p-2 rounded-lg bg-purple-100 text-purple-700">
                                        <Icons.ClipboardList size={20} />
                                    </div>
                                    <div className="text-right">
                                        <span className="block font-bold text-slate-800">ניהול תהליכים (Gap Analysis)</span>
                                        {customTopics.length > 0 && (
                                            <span className="text-xs text-purple-600 font-medium">{customTopics.length} נושאים מוגדרים</span>
                                        )}
                                    </div>
                                </div>
                                <Icons.ChevronDown size={20} className={`text-slate-400 transition-transform ${expandedModules['custom_processes'] ? 'rotate-180' : ''}`} />
                            </button>

                            {expandedModules['custom_processes'] && (
                                <div className="border-t border-slate-100 p-4 bg-slate-50">
                                    {/* Textarea for Bulk Entry */}
                                    <div className="mb-6 bg-white p-4 rounded-lg border border-slate-200 shadow-sm">
                                        <label className="block text-sm font-bold text-slate-700 mb-2">טעינת רשימת נושאים חופשית</label>
                                        <p className="text-xs text-slate-500 mb-3">הזן נושאים או תהליכים מבוקשים (כל נושא בשורה חדשה) כדי לייצר עבורם תבנית אפיון למילוי.</p>
                                        <textarea
                                            value={rawTopics}
                                            onChange={(e) => setRawTopics(e.target.value)}
                                            className="w-full p-3 border border-slate-300 rounded focus:border-purple-500 focus:ring-1 focus:ring-purple-500 outline-none mb-3 text-sm h-20 resize-none"
                                            placeholder="לדוגמה:&#10;תהליך קליטת סוכן חדש בשטח&#10;אישור חריגות באשראי לקוח"
                                        />
                                        <button 
                                            onClick={handleAddTopics}
                                            className="w-full py-2 bg-purple-600 text-white text-sm font-bold rounded hover:bg-purple-700 transition-colors"
                                        >
                                            טען נושאים לתבניות תהליך
                                        </button>
                                    </div>

                                    {/* Render Custom Topics & Rows */}
                                    <div className="space-y-6">
                                        {customTopics.map((topic) => (
                                            <div key={topic.id} className="bg-purple-50/50 p-4 rounded-xl border border-purple-100 shadow-sm">
                                                {/* Editable Topic Title */}
                                                <div className="flex items-center gap-2 mb-4 pr-2 border-r-4 border-purple-500">
                                                    <input
                                                        type="text"
                                                        value={topic.title}
                                                        onChange={(e) => handleTopicUpdate(topic.id, e.target.value)}
                                                        className="flex-1 font-black text-lg text-purple-900 bg-transparent border-b border-transparent focus:border-purple-300 outline-none transition-colors px-1"
                                                        placeholder="שם הנושא / התהליך..."
                                                    />
                                                </div>
                                                
                                                {/* Rows List */}
                                                <div className="space-y-3">
                                                    {topic.rows.map((row, rowIndex) => (
                                                        <div key={row.id} className="bg-white border border-slate-200 rounded-lg shadow-sm transition-all">
                                                            {/* Row Header (Type, CORE, HIGH EFFORT, Move Up/Down, Delete) */}
                                                            <div className="flex justify-between items-center p-2.5 border-b border-slate-100 bg-slate-50 rounded-t-lg">
                                                                <div className="flex items-center gap-4">
                                                                    <select 
                                                                        value={row.isCustom ? 'custom' : 'standard'}
                                                                        onChange={(e) => handleRowUpdate(topic.id, row.id, 'isCustom', e.target.value === 'custom')}
                                                                        className={`text-sm font-bold bg-transparent border-none outline-none cursor-pointer focus:ring-0 ${row.isCustom ? 'text-red-700' : 'text-slate-800'}`}
                                                                    >
                                                                        <option value="standard">מובנה במערכת (Standard)</option>
                                                                        <option value="custom">התאמה אישית (Custom Gap)</option>
                                                                    </select>
                                                                    <div className="w-px h-4 bg-slate-300"></div>
                                                                    <label className="flex items-center gap-1.5 cursor-pointer hover:opacity-80 transition-opacity">
                                                                        <input 
                                                                            type="checkbox" 
                                                                            checked={row.isCore} 
                                                                            onChange={(e) => handleRowUpdate(topic.id, row.id, 'isCore', e.target.checked)} 
                                                                            className="w-3.5 h-3.5 text-slate-800 rounded border-slate-300 focus:ring-slate-800" 
                                                                        />
                                                                        <span className="text-[10px] bg-slate-800 text-white px-1.5 py-0.5 rounded font-bold tracking-wide">CORE</span>
                                                                    </label>
                                                                    <label className="flex items-center gap-1.5 cursor-pointer hover:opacity-80 transition-opacity">
                                                                        <input 
                                                                            type="checkbox" 
                                                                            checked={row.isHighEffort} 
                                                                            onChange={(e) => handleRowUpdate(topic.id, row.id, 'isHighEffort', e.target.checked)} 
                                                                            className="w-3.5 h-3.5 text-amber-500 rounded border-slate-300 focus:ring-amber-500" 
                                                                        />
                                                                        <span className="text-[10px] bg-amber-100 text-amber-700 px-1.5 py-0.5 rounded font-bold tracking-wide border border-amber-200">HIGH EFFORT</span>
                                                                    </label>
                                                                </div>
                                                                <div className="flex items-center gap-1.5">
                                                                    <button 
                                                                        onClick={() => handleMoveRow(topic.id, rowIndex, 'up')} 
                                                                        disabled={rowIndex === 0}
                                                                        className={`p-1 rounded ${rowIndex === 0 ? 'text-slate-300 cursor-not-allowed' : 'text-slate-500 hover:bg-slate-200 hover:text-slate-800'} transition-colors`}
                                                                        title="הזז למעלה"
                                                                    >
                                                                        <Icons.ArrowUp size={16} />
                                                                    </button>
                                                                    <button 
                                                                        onClick={() => handleMoveRow(topic.id, rowIndex, 'down')} 
                                                                        disabled={rowIndex === topic.rows.length - 1}
                                                                        className={`p-1 rounded ${rowIndex === topic.rows.length - 1 ? 'text-slate-300 cursor-not-allowed' : 'text-slate-500 hover:bg-slate-200 hover:text-slate-800'} transition-colors`}
                                                                        title="הזז למטה"
                                                                    >
                                                                        <Icons.ArrowDown size={16} />
                                                                    </button>
                                                                    <div className="w-px h-4 bg-slate-300 mx-1"></div>
                                                                    <button 
                                                                        onClick={() => handleRemoveRow(topic.id, row.id)} 
                                                                        className="p-1 rounded text-slate-400 hover:bg-red-50 hover:text-red-500 transition-colors" 
                                                                        title="הסר שורה"
                                                                    >
                                                                        <Icons.Trash size={16} />
                                                                    </button>
                                                                </div>
                                                            </div>

                                                            {/* Row Inputs (5 Columns Grid) */}
                                                            <div className="p-3 grid grid-cols-12 gap-3">
                                                                <div className="col-span-12 md:col-span-3">
                                                                    <label className="block text-xs font-bold text-slate-500 mb-1">משתמש</label>
                                                                    <select 
                                                                        value={row.user} 
                                                                        onChange={(e) => handleRowUpdate(topic.id, row.id, 'user', e.target.value)} 
                                                                        className="w-full p-2 border border-slate-200 rounded text-sm outline-none focus:border-purple-500 bg-slate-50 focus:bg-white"
                                                                    >
                                                                        <option value="" disabled>בחר תפקיד...</option>
                                                                        {PREDEFINED_USERS.map(u => <option key={u} value={u}>{u}</option>)}
                                                                    </select>
                                                                </div>
                                                                <div className="col-span-12 md:col-span-6">
                                                                    <label className="block text-xs font-bold text-slate-500 mb-1">פעולה (מה קורה?)</label>
                                                                    <input 
                                                                        type="text" 
                                                                        value={row.action} 
                                                                        onChange={(e) => handleRowUpdate(topic.id, row.id, 'action', e.target.value)} 
                                                                        className="w-full p-2 border border-slate-200 rounded text-sm outline-none focus:border-purple-500 bg-slate-50 focus:bg-white" 
                                                                        placeholder="הזן תיאור פעולה..." 
                                                                    />
                                                                </div>
                                                                <div className="col-span-12 md:col-span-3">
                                                                    <label className="block text-xs font-bold text-slate-500 mb-1">נתיב ממשק (API Endpoint)</label>
                                                                    <input 
                                                                        type="text" 
                                                                        value={row.apiEndpoint || ''} 
                                                                        onChange={(e) => handleRowUpdate(topic.id, row.id, 'apiEndpoint', e.target.value)} 
                                                                        className="w-full p-2 border border-slate-200 rounded text-sm outline-none focus:border-purple-500 bg-slate-50 focus:bg-white font-mono" 
                                                                        placeholder="לדוגמה: POST /api/..." 
                                                                    />
                                                                </div>
                                                                <div className="col-span-12 md:col-span-4">
                                                                    <label className="block text-xs font-bold text-slate-500 mb-1">מצב מצוי (כיום)</label>
                                                                    <textarea 
                                                                        value={row.current} 
                                                                        onChange={(e) => handleRowUpdate(topic.id, row.id, 'current', e.target.value)} 
                                                                        className="w-full p-2 border border-slate-200 rounded text-sm outline-none focus:border-purple-500 h-16 resize-none bg-slate-50 focus:bg-white" 
                                                                        placeholder="איך מתבצע כיום?" 
                                                                    />
                                                                </div>
                                                                <div className="col-span-12 md:col-span-4">
                                                                    <label className="block text-xs font-bold text-slate-500 mb-1">מצב רצוי (באפליקציה)</label>
                                                                    <textarea 
                                                                        value={row.desired} 
                                                                        onChange={(e) => handleRowUpdate(topic.id, row.id, 'desired', e.target.value)} 
                                                                        className="w-full p-2 border border-slate-200 rounded text-sm outline-none focus:border-purple-500 h-16 resize-none bg-slate-50 focus:bg-white" 
                                                                        placeholder="ההתנהגות הנדרשת..." 
                                                                    />
                                                                </div>
                                                                <div className="col-span-12 md:col-span-4">
                                                                    <label className="block text-xs font-bold text-slate-500 mb-1">הערות</label>
                                                                    <textarea 
                                                                        value={row.notes} 
                                                                        onChange={(e) => handleRowUpdate(topic.id, row.id, 'notes', e.target.value)} 
                                                                        className="w-full p-2 border border-slate-200 rounded text-sm outline-none focus:border-purple-500 h-16 resize-none bg-slate-50 focus:bg-white" 
                                                                        placeholder="ממשקים, תלויות..." 
                                                                    />
                                                                </div>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>

                                                <button 
                                                    onClick={() => handleAddRow(topic.id)} 
                                                    className="flex items-center gap-2 text-sm font-bold text-purple-600 hover:text-purple-800 mt-3 px-3 py-1.5 rounded-md hover:bg-purple-100/50 transition-colors w-max"
                                                >
                                                    <Icons.Plus size={16} /> הוסף שורת תהליך לנושא זה
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* Standard Modules List */}
                        {currentModules.map(module => {
                            const ModuleIcon = module.icon;
                            const isExpanded = expandedModules[module.id];
                            
                            const selectedInModule = module.personas.reduce((acc, p) => 
                                acc + p.features.filter(f => selectedFeatures.has(f.id)).length, 0
                            );

                            return (
                                <div key={module.id} className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden mb-4">
                                    <button 
                                        onClick={() => toggleModule(module.id)}
                                        className="w-full flex items-center justify-between p-4 bg-white hover:bg-slate-50 transition-colors"
                                    >
                                        <div className="flex items-center gap-3">
                                            <div className={`p-2 rounded-lg ${selectedInModule > 0 ? 'bg-cyan-100 text-cyan-700' : 'bg-slate-100 text-slate-500'}`}>
                                                <ModuleIcon size={20} />
                                            </div>
                                            <div className="text-right">
                                                <span className="block font-bold text-slate-800">{module.name}</span>
                                                {selectedInModule > 0 && (
                                                    <span className="text-xs text-cyan-600 font-medium">{selectedInModule} פיצ'רים נבחרו</span>
                                                )}
                                            </div>
                                        </div>
                                        <Icons.ChevronDown size={20} className={`text-slate-400 transition-transform ${isExpanded ? 'rotate-180' : ''}`} />
                                    </button>

                                    {isExpanded && (
                                        <div className="border-t border-slate-100">
                                            {module.personas.map((persona, idx) => (
                                                <div key={persona.id} className={`${idx > 0 ? 'border-t border-slate-100' : ''}`}>
                                                    <div className="px-4 py-2 bg-slate-50 text-xs font-bold text-slate-500 uppercase tracking-wide">
                                                        {persona.name}
                                                    </div>
                                                    <div className="p-3">
                                                        {persona.features.map(feature => {
                                                            const isDisabled = feature.conflicts?.some(conflictId => selectedFeatures.has(conflictId));
                                                            return (
                                                                <FeatureItem 
                                                                    key={feature.id}
                                                                    feature={feature}
                                                                    isSelected={selectedFeatures.has(feature.id)}
                                                                    isDisabled={isDisabled}
                                                                    onToggle={(id) => toggleFeature(id, feature.conflicts)}
                                                                />
                                                            );
                                                        })}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                </div>

                {/* LEFT PANEL: PREVIEW (Output) */}
                <div className="w-1/2 bg-slate-100 flex flex-col relative print-content">
                    
                    {/* View Toggle */}
                    <div className="absolute top-4 left-4 z-20 flex bg-white rounded-lg p-1 shadow-md border border-slate-200 no-print">
                        <button 
                            onClick={() => setViewMode('SOW')}
                            className={`px-4 py-1.5 text-sm rounded-md font-medium transition-all ${viewMode === 'SOW' ? 'bg-slate-800 text-white shadow-sm' : 'text-slate-500 hover:text-slate-800'}`}
                        >
                            <Icons.FileText size={16} className="inline ml-2" />
                            SOW
                        </button>
                        <button 
                            onClick={() => setViewMode('TECH')}
                            className={`px-4 py-1.5 text-sm rounded-md font-medium transition-all ${viewMode === 'TECH' ? 'bg-cyan-600 text-white shadow-sm' : 'text-slate-500 hover:text-slate-800'}`}
                        >
                            <Icons.Code size={16} className="inline ml-2" />
                            Tech Spec
                        </button>
                    </div>

                    {/* Document Content */}
                    <div className="flex-1 overflow-y-auto p-12 print-content">
                        <div className="max-w-3xl mx-auto bg-white min-h-[800px] shadow-lg rounded-sm p-12 relative">
                            
                            {/* Placeholder when empty */}
                            {(selectedFeatures.size === 0 && customTopics.length === 0) && (
                                <div className="absolute inset-0 flex flex-col items-center justify-center text-slate-300 pointer-events-none no-print">
                                    <Icons.LayoutDashboard size={64} className="mb-4 opacity-50" />
                                    <p className="text-lg font-medium">התחל לסמן מודולים או תהליכים להצגת המסמך</p>
                                </div>
                            )}

                            {viewMode === 'SOW' ? (
                                <div className="prose prose-slate max-w-none text-right" dir="rtl">
                                    
                                    {/* SOW Header */}
                                    <div className="border-b-2 border-slate-900 pb-6 mb-8 relative">
                                        <h1 className="text-3xl font-black text-slate-900 m-0">נספח תכולה (SOW)</h1>
                                        <p className="text-slate-500 mt-2 text-lg">פלטפורמת ONEFLOW 360 - אפיון פרויקט {businessType}</p>
                                    </div>

                                    {/* --- GAUGE METER (Alert for Customizations) --- */}
                                    {stats.totalItems > 0 && (
                                        <div className={`p-5 rounded-xl border-2 mb-8 break-inside-avoid no-print ${isExceedingCustomPercent ? 'bg-red-50 border-red-200' : 'bg-slate-50 border-slate-200'}`}>
                                            <div className="flex justify-between items-end mb-3">
                                                <div>
                                                    <h4 className="font-black text-lg mb-1 text-slate-800">מדד התאמות אישיות במערכת</h4>
                                                    <div className="text-sm font-medium text-slate-500">
                                                        {stats.customItemsCount} שורות מותאמות אישית מתוך סך של {stats.totalItems} רכיבי תכולה נבחרים
                                                    </div>
                                                </div>
                                                <div className={`text-3xl font-black tracking-tight ${isExceedingCustomPercent ? 'text-red-600' : 'text-slate-800'}`}>
                                                    {stats.customPercent.toFixed(1)}%
                                                </div>
                                            </div>
                                            <div className="w-full bg-slate-200 h-3 rounded-full overflow-hidden shadow-inner">
                                                <div 
                                                    className={`h-full transition-all duration-500 ${isExceedingCustomPercent ? 'bg-red-500' : 'bg-cyan-500'}`} 
                                                    style={{width: `${Math.min(stats.customPercent, 100)}%`}}>
                                                </div>
                                            </div>
                                            {isExceedingCustomPercent && (
                                                <div className="mt-3 text-red-600 text-sm font-bold flex items-center gap-2">
                                                    <Icons.AlertTriangle size={18} />
                                                    <span>שים לב: אחוז ההתאמות האישיות חורג מהרף המומלץ (5%). הדבר עלול לגרור עלויות פיתוח וזמני הקמה ארוכים.</span>
                                                </div>
                                            )}
                                        </div>
                                    )}

                                    {/* --- FILTER BUTTONS --- */}
                                    <div className="flex items-center gap-2 mb-8 bg-slate-100 p-1.5 rounded-lg w-max no-print border border-slate-200">
                                        <div className="px-2 text-slate-400"><Icons.Filter size={16} /></div>
                                        <button 
                                            onClick={() => setFilterMode('ALL')} 
                                            className={`px-4 py-1.5 text-sm rounded-md font-bold transition-all ${filterMode === 'ALL' ? 'bg-white text-slate-900 shadow' : 'text-slate-500 hover:text-slate-700'}`}
                                        >הצג הכל</button>
                                        <button 
                                            onClick={() => setFilterMode('STANDARD')} 
                                            className={`px-4 py-1.5 text-sm rounded-md font-bold transition-all ${filterMode === 'STANDARD' ? 'bg-white text-slate-900 shadow' : 'text-slate-500 hover:text-slate-700'}`}
                                        >סטנדרט בלבד</button>
                                        <button 
                                            onClick={() => setFilterMode('CUSTOM')} 
                                            className={`px-4 py-1.5 text-sm rounded-md font-bold transition-all ${filterMode === 'CUSTOM' ? 'bg-white text-purple-700 shadow ring-1 ring-purple-100' : 'text-slate-500 hover:text-purple-600'}`}
                                        >התאמות אישיות (Gap)</button>
                                    </div>


                                    {/* Standard SOW Body (Hidden if CUSTOM filter is on) */}
                                    {filterMode !== 'CUSTOM' && currentModules.map(module => {
                                        const moduleFeatures = [];
                                        module.personas.forEach(p => {
                                            p.features.forEach(f => {
                                                if (selectedFeatures.has(f.id)) {
                                                    moduleFeatures.push(f);
                                                }
                                            });
                                        });

                                        if (moduleFeatures.length === 0) return null;

                                        return (
                                            <div key={module.id} className="mb-8 break-inside-avoid">
                                                <h3 className="text-xl font-bold text-cyan-700 border-r-4 border-cyan-500 pr-3 mb-4">
                                                    {module.name}
                                                </h3>
                                                <ul className="space-y-4 list-none p-0">
                                                    {moduleFeatures.map(f => (
                                                        <li key={f.id} className="bg-slate-50 p-4 rounded-lg border border-slate-100 break-inside-avoid shadow-sm">
                                                            <div className="flex justify-between items-start mb-1">
                                                                <span className="block font-bold text-slate-900">{f.name}</span>
                                                                <span className="text-[10px] bg-slate-200 text-slate-600 px-1.5 py-0.5 rounded font-bold uppercase tracking-wider border border-slate-300">
                                                                    מובנה במערכת
                                                                </span>
                                                            </div>
                                                            <span className="text-slate-600 leading-relaxed text-sm">{f.sow}</span>
                                                        </li>
                                                    ))}
                                                </ul>
                                            </div>
                                        );
                                    })}

                                    {/* Custom Processes Tables (Filtered based on view mode) */}
                                    {customTopics.length > 0 && (
                                        <div className="mb-8 mt-12 break-inside-avoid">
                                            {/* We group rows by topic and filter them */}
                                            {customTopics.map(topic => {
                                                const visibleRows = topic.rows.filter(r => {
                                                    if (filterMode === 'STANDARD') return !r.isCustom;
                                                    if (filterMode === 'CUSTOM') return r.isCustom;
                                                    return true;
                                                });

                                                if (visibleRows.length === 0) return null;

                                                return (
                                                    <div key={topic.id} className="mb-8">
                                                        <h3 className="text-xl font-black text-purple-700 border-r-4 border-purple-500 pr-3 mb-4">
                                                            {topic.title || 'נושא ללא שם'}
                                                        </h3>
                                                        <div className="overflow-x-auto rounded-lg border border-slate-300 shadow-sm">
                                                            <table className="w-full text-sm text-right border-collapse m-0">
                                                                <thead className="bg-slate-100 text-slate-800">
                                                                    <tr>
                                                                        <th className="border-b border-l border-slate-300 p-3 font-bold w-1/8">משתמש</th>
                                                                        <th className="border-b border-l border-slate-300 p-3 font-bold w-1/5">פעולה (API)</th>
                                                                        <th className="border-b border-l border-slate-300 p-3 font-bold w-1/4">מצב מצוי</th>
                                                                        <th className="border-b border-l border-slate-300 p-3 font-bold w-1/4">מצב רצוי</th>
                                                                        <th className="border-b border-slate-300 p-3 font-bold">הערות</th>
                                                                    </tr>
                                                                </thead>
                                                                <tbody className="bg-white">
                                                                    {visibleRows.map((cp) => (
                                                                        <tr key={cp.id} className="hover:bg-slate-50 transition-colors">
                                                                            <td className="border-b border-l border-slate-200 p-3 text-slate-700 align-top font-bold bg-slate-50/50">{cp.user}</td>
                                                                            <td className="border-b border-l border-slate-200 p-3 text-slate-800 align-top">
                                                                                <span className="block font-bold">{cp.action}</span>
                                                                                {cp.apiEndpoint && (
                                                                                    <span className="block mt-1 text-xs text-blue-600 font-mono" dir="ltr">{cp.apiEndpoint}</span>
                                                                                )}
                                                                                <div className="flex flex-wrap gap-1 mt-2">
                                                                                    {cp.isCustom ? (
                                                                                        <span className="text-[10px] bg-red-100 text-red-700 px-1.5 py-0.5 rounded font-bold border border-red-200">
                                                                                            התאמה אישית
                                                                                        </span>
                                                                                    ) : (
                                                                                        <span className="text-[10px] bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded font-bold border border-slate-200">
                                                                                            תכולת סטנדרט
                                                                                        </span>
                                                                                    )}
                                                                                    {cp.isCore && (
                                                                                        <span className="text-[10px] bg-slate-800 text-white px-1.5 py-0.5 rounded font-bold tracking-wide">
                                                                                            CORE
                                                                                        </span>
                                                                                    )}
                                                                                    {cp.isHighEffort && (
                                                                                        <span className="text-[10px] bg-amber-100 text-amber-700 px-1.5 py-0.5 rounded font-bold tracking-wide border border-amber-200">
                                                                                            HIGH EFFORT
                                                                                        </span>
                                                                                    )}
                                                                                </div>
                                                                            </td>
                                                                            <td className="border-b border-l border-slate-200 p-3 text-slate-600 whitespace-pre-wrap align-top">{cp.current}</td>
                                                                            <td className="border-b border-l border-slate-200 p-3 text-slate-600 whitespace-pre-wrap align-top">{cp.desired}</td>
                                                                            <td className="border-b border-slate-200 p-3 text-slate-500 text-xs align-top bg-slate-50/30">{cp.notes}</td>
                                                                        </tr>
                                                                    ))}
                                                                </tbody>
                                                            </table>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    )}

                                </div>
                            ) : (
                                <div className="font-mono text-sm text-left" dir="ltr">
                                     {/* Tech Header */}
                                     <div className="border-b border-slate-200 pb-4 mb-6 flex justify-between items-center" dir="rtl">
                                        <div>
                                            <h2 className="text-2xl font-bold text-slate-800">מפרט טכני</h2>
                                            <p className="text-slate-500">System Manifest & API Requirements</p>
                                        </div>
                                        <div className="text-xs bg-slate-100 px-2 py-1 rounded border border-slate-200">
                                            JSON Format
                                        </div>
                                    </div>

                                    {/* API List */}
                                    <div className="mb-8">
                                        <h4 className="text-slate-400 font-bold uppercase tracking-wider mb-3">Required Endpoints</h4>
                                        {stats.apiCount > 0 ? (
                                            <div className="bg-slate-900 rounded-lg p-4 overflow-x-auto">
                                                {stats.combinedEndpoints.map((f, i) => (
                                                        <div key={f.id + i} className="flex items-center gap-3 mb-2 last:mb-0">
                                                            <span className={`text-xs font-bold px-1.5 py-0.5 rounded ${
                                                                f.tech.startsWith('GET') ? 'bg-blue-500/20 text-blue-400' : 
                                                                f.tech.startsWith('POST') ? 'bg-green-500/20 text-green-400' : 'bg-purple-500/20 text-purple-400'
                                                            }`}>
                                                                {f.tech.split(' ')[0]}
                                                            </span>
                                                            <span className="text-slate-300">{f.tech.split(' ')[1] || f.tech}</span>
                                                            <span className="text-slate-600 text-xs ml-auto">// {f.name}</span>
                                                        </div>
                                                    ))
                                                }
                                            </div>
                                        ) : (
                                            <p className="text-slate-400 italic">No API integrations required yet.</p>
                                        )}
                                    </div>

                                    {/* JSON Dump */}
                                    <div>
                                        <h4 className="text-slate-400 font-bold uppercase tracking-wider mb-3">System Manifest</h4>
                                        <pre className="bg-slate-50 border border-slate-200 rounded-lg p-4 text-slate-700 overflow-x-auto whitespace-pre-wrap">
                                            {techSpecJson}
                                        </pre>
                                    </div>
                                </div>
                            )}

                        </div>
                    </div>

                    {/* Bottom Dashboard */}
                    <div className="bg-white border-t border-slate-200 p-4 shrink-0 flex items-center justify-between shadow-[0_-5px_15px_rgba(0,0,0,0.05)] z-20 no-print">
                        <div className="flex gap-8">
                            <div className="flex flex-col">
                                <span className="text-xs text-slate-400 font-medium uppercase">פיצ'רים + תהליכים</span>
                                <span className="text-2xl font-bold text-slate-800 leading-none">{stats.totalItems}</span>
                            </div>
                            <div className="flex flex-col border-r border-slate-100 pr-8">
                                <span className="text-xs text-slate-400 font-medium uppercase">ממשקים (API)</span>
                                <span className="text-2xl font-bold text-cyan-600 leading-none">{stats.apiCount}</span>
                            </div>
                        </div>

                        <div className="flex items-center gap-4 pl-4">
                            <div className="text-left">
                                <span className="block text-xs text-slate-400 font-medium uppercase">Complexity Score</span>
                                <span className={`block text-xl font-black ${complexityLevel.color}`}>
                                    {stats.complexity} <span className="text-sm font-normal text-slate-400">נק'</span>
                                </span>
                            </div>
                            <div className={`px-4 py-2 rounded-lg font-bold border-2 ${complexityLevel.bg} ${complexityLevel.color} border-current opacity-80`}>
                                {complexityLevel.label}
                            </div>
                        </div>
                    </div>

                </div>
              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
