</head>

            LayoutDashboard: ({size=64, className}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>,

            Download: ({size=16, className}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
        };

        // --- SYSTEM DATA ---
        const SYSTEM_DATA = {
          B2B: [
            {

                    { 
                      id: 'switch_user',

                      sow: 'יכולת לסוכן "להתחזות" ללקוח ספציפי ולבצע הזמנה בשמו, תוך ראיית המחירים והתנאים של הלקוח.',

                        {

            },
            {

              personas: [
                {

                  features: [

                      complexity: 3, 
                      core: true 
                    },
                    {
                        id: 'smart_route',
                        name: 'Smart Route',
                        sow: 'סידור חכם של פריטי הליקוט לפי מסלול הליכה אופטימלי במחסן.',

                    }
                  ]

                {

                    name: 'נהג חלוקה',
                    features: [
                        {

                            sow: 'החתמת הלקוח על גבי המסך וצילום הסחורה/תעודה כהוכחת מסירה.',
                            tech: 'POST /delivery/sign',

                        {
                            id: 'waze_link',

                            sow: 'קישור מהיר לניווט לכתובת הלקוח מתוך תעודת המשלוח.',
                            tech: 'Deep Link Protocol',
                            complexity: 1,
                            core: false
                        }
                    ]
                }
              ]
            }
          ],
          B2C: [
              {
                  id: 'storefront',
                  name: 'חנות קמעונאית (Storefront)',
                  icon: Icons.Smartphone,
                  personas: [
                      {
                          id: 'shopper',
                          name: 'קונה (Shopper)',
                          features: [
                              {
                                  id: 'guest_checkout',
                                  name: 'Guest Checkout',
                                  sow: 'תהליך רכישה מהיר ללא צורך בהרשמה מוקדמת.',
                                  tech: 'POST /checkout/guest',
                                  complexity: 3,
                                  core: true
                              },
                              {
                                  id: 'coupons',
                                  name: 'Coupons & Promo Codes',
                                  sow: 'מנגנון הזנת קופונים וקודי קמפיין בעגלת הקניות.',
                                  tech: 'POST /cart/apply-coupon',
                                  complexity: 4,
                                  core: false
                              },
                              {
                                  id: 'seo_basic',
                                  name: 'Basic SEO',
                                  sow: 'תמיכה בתגיות מטא ו-SSR לאינדוקס מוצרים בגוגל.',
                                  tech: 'Server Side Rendering / Meta Injection',
                                  complexity: 5,
                                  core: true
                              }
                          ]
                      }
                  ]
              }
          ]
        };

        // --- COMPONENTS ---

        const FeatureItem = ({ feature, isSelected, onToggle, isDisabled }) => {
          return (
            <div 
              onClick={() => !isDisabled && onToggle(feature.id)}
              className={`
                relative flex items-start p-3 rounded-lg border transition-all cursor-pointer select-none mb-2
                ${isDisabled ? 'opacity-40 bg-slate-100 cursor-not-allowed border-slate-200' : 
                  isSelected ? 'bg-cyan-50 border-cyan-500 shadow-sm' : 'bg-white border-slate-200 hover:border-cyan-300'}
              `}
            >
              <div className={`
                mt-0.5 ml-3 w-5 h-5 rounded border flex items-center justify-center transition-colors shrink-0
                ${isSelected ? 'bg-cyan-500 border-cyan-500' : 'bg-white border-slate-300'}
              `}>
                {isSelected && <Icons.CheckCircle size={14} className="text-white" />}
              </div>
              
              <div className="flex-1">
                <div className="flex items-center justify-between">
                  <span className={`font-medium text-sm ${isSelected ? 'text-cyan-900' : 'text-slate-700'}`}>
                    {feature.name}
                  </span>
                  <div className="flex gap-1">
                    {feature.core && (
                      <span className="text-[10px] bg-slate-800 text-white px-1.5 py-0.5 rounded font-bold tracking-wide">CORE</span>
                    )}
                    {feature.highEffort && (
                      <span className="text-[10px] bg-amber-100 text-amber-700 px-1.5 py-0.5 rounded font-bold tracking-wide border border-amber-200 flex items-center gap-0.5">
                         HIGH EFFORT
                      </span>
                    )}
                  </div>
                </div>
                <p className="text-xs text-slate-500 mt-1 leading-relaxed">
                  {feature.sow}
                </p>
              </div>
            </div>
          );
        };

        const App = () => {
          // State
          const [businessType, setBusinessType] = useState('B2B'); // B2B | B2C
          const [selectedFeatures, setSelectedFeatures] = useState(new Set());
          const [viewMode, setViewMode] = useState('SOW'); // SOW | TECH
          const [expandedModules, setExpandedModules] = useState({});
          
          // New State for Client Details
          const [clientName, setClientName] = useState('');
          const [projectDate, setProjectDate] = useState(new Date().toISOString().split('T')[0]);

          // Init expanded state
          useEffect(() => {
              const initialExpanded = {};
              SYSTEM_DATA.B2B.forEach(m => initialExpanded[m.id] = true);
              SYSTEM_DATA.B2C.forEach(m => initialExpanded[m.id] = true);
              setExpandedModules(initialExpanded);
          }, []);

          // Reset selection when business type changes
          const handleBusinessTypeChange = (type) => {
            setBusinessType(type);
            setSelectedFeatures(new Set());
          };

          const toggleFeature = (featureId, conflicts = []) => {
            const nextSelected = new Set(selectedFeatures);
            
            if (nextSelected.has(featureId)) {
              nextSelected.delete(featureId);
            } else {
              nextSelected.add(featureId);
              // Remove conflicts
              if (conflicts && conflicts.length > 0) {
                conflicts.forEach(conflictId => nextSelected.delete(conflictId));
              }
            }
            setSelectedFeatures(nextSelected);
          };

          const toggleModule = (modId) => {
            setExpandedModules(prev => ({
                ...prev,
                [modId]: !prev[modId]
            }));
          };

          const currentModules = SYSTEM_DATA[businessType];

          const stats = useMemo(() => {
            let complexity = 0;
            let apiCount = 0;
            let featureCount = 0;
            let selectedList = [];

            currentModules.forEach(mod => {
              mod.personas.forEach(persona => {
                persona.features.forEach(feat => {
                  if (selectedFeatures.has(feat.id)) {
                    complexity += feat.complexity;
                    featureCount++;
                    if (feat.tech && !feat.tech.includes('Middleware') && !feat.tech.includes('Algorithm')) {
                        apiCount++;
                    }
                    selectedList.push({ ...feat, moduleName: mod.name, personaName: persona.name });
                  }
                });
              });
            });

            return { complexity, apiCount, featureCount, selectedList };
          }, [selectedFeatures, currentModules]);

          const complexityLevel = useMemo(() => {
              if (stats.complexity < 15) return { label: 'LOW', color: 'text-green-600', bg: 'bg-green-100' };
              if (stats.complexity < 40) return { label: 'MEDIUM', color: 'text-amber-600', bg: 'bg-amber-100' };
              return { label: 'HIGH', color: 'text-red-600', bg: 'bg-red-100' };
          }, [stats.complexity]);

          const techSpecJson = useMemo(() => {
              const manifest = {
                  client: clientName,
                  date: projectDate,
                  projectType: businessType,
                  modules: [],
                  complexityScore: stats.complexity,
                  apiEndpoints: []
              };

              const moduleMap = {};

              stats.selectedList.forEach(feat => {
                  if (!moduleMap[feat.moduleName]) {
                      moduleMap[feat.moduleName] = { name: feat.moduleName, features: [] };
                  }
                  moduleMap[feat.moduleName].features.push({
                      key: feat.id,
                      name: feat.name,
                      spec: feat.tech
                  });
                  
                  if(feat.tech.startsWith('GET') || feat.tech.startsWith('POST') || feat.tech.startsWith('PUT')) {
                      manifest.apiEndpoints.push(feat.tech);
                  }
              });

              manifest.modules = Object.values(moduleMap);
              return JSON.stringify(manifest, null, 2);
          }, [stats, businessType, clientName, projectDate]);

          // --- EXPORT TO EXCEL (CSV) ---
          const handleExportExcel = () => {
              // CSV Headers
              const headers = ['מודול', 'פרסונה', 'שם פיצ\'ר', 'תכולה (SOW)', 'מפרט טכני', 'מורכבות', 'Core', 'High Effort'];
              const rows = [];

              // Add Metadata row
              rows.push([`לקוח: ${clientName}`, `תאריך: ${projectDate}`, `סוג: ${businessType}`, '', '', '', '', '']);
              rows.push([]); // empty row
              rows.push(headers);

              // Data Rows
              stats.selectedList.forEach(item => {
                  rows.push([
                      `"${item.moduleName}"`,
                      `"${item.personaName}"`,
                      `"${item.name}"`,
                      `"${item.sow.replace(/"/g, '""')}"`, // Escape quotes for CSV
                      `"${item.tech}"`,
                      item.complexity,
                      item.core ? 'כן' : 'לא',
                      item.highEffort ? 'כן' : 'לא'
                  ]);
              });

              // Add BOM for Hebrew support in Excel
              const BOM = '\uFEFF';
              const csvContent = BOM + rows.map(e => e.join(',')).join('\n');

              // Create Download Link
              const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
              const url = URL.createObjectURL(blob);
              const link = document.createElement('a');
              link.href = url;
              const safeName = clientName ? clientName.replace(/[^a-z0-9א-ת]/gi, '_') : 'Draft';
              link.setAttribute('download', `ONEFLOW_Scope_${safeName}_${projectDate}.csv`);
              document.body.appendChild(link);
              link.click();
              document.body.removeChild(link);
          };

          return (
            <div className="flex flex-col h-full">
              
              {/* Header */}
              <header className="bg-slate-900 text-white p-4 shadow-md flex justify-between items-center z-10 shrink-0 no-print">
                <div className="flex items-center gap-3">
                    <div className="w-8 h-8 rounded bg-cyan-500 flex items-center justify-center font-bold text-lg">O</div>
                    <div>
                        <h1 className="text-lg font-bold leading-none">ONEFLOW 360 PRO</h1>
                        <span className="text-xs text-slate-400">Scoping & Sales Tool v2.0</span>
                    </div>
                </div>
                <div className="flex gap-2">
                    <button onClick={handleExportExcel} className="flex items-center gap-2 px-3 py-1.5 text-xs bg-green-700 hover:bg-green-600 rounded border border-green-600 transition-colors">
                        <Icons.Download size={14} />
                        ייצוא לאקסל
                    </button>
                    <button className="px-3 py-1.5 text-xs bg-slate-800 hover:bg-slate-700 rounded border border-slate-700 transition-colors">
                        שמור טיוטה
                    </button>
                    <button onClick={() => window.print()} className="px-3 py-1.5 text-xs bg-cyan-600 hover:bg-cyan-500 rounded font-medium transition-colors">
                        הדפס PDF
                    </button>
                </div>
              </header>

              {/* Main Content */}
              <div className="flex flex-1 overflow-hidden">
                
                {/* RIGHT PANEL: CONFIGURATOR (Input) */}
                <div className="w-1/2 flex flex-col border-l border-slate-200 bg-white shadow-xl z-10 no-print">
                    
                    {/* Top Config Controls */}
                    <div className="p-6 border-b border-slate-100 bg-white">
                        
                        {/* New: Client Details Inputs */}
                        <div className="bg-white p-4 rounded-lg border border-slate-200 shadow-sm mb-4">
                            <h3 className="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-3 flex items-center gap-2">
                                <Icons.FileText size={14} />
                                פרטי פרויקט
                            </h3>
                            <div className="grid grid-cols-2 gap-3">
                                <div>
                                    <label className="block text-xs font-medium text-slate-700 mb-1">שם הלקוח</label>
                                    <input 
                                        type="text" 
                                        value={clientName}
                                        onChange={(e) => setClientName(e.target.value)}
                                        className="w-full p-2 text-sm border border-slate-300 rounded focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 outline-none transition-colors"
                                        placeholder="הזן שם לקוח..."
                                    />
                                </div>
                                <div>
                                    <label className="block text-xs font-medium text-slate-700 mb-1">תאריך אפיון</label>
                                    <input 
                                        type="date" 
                                        value={projectDate}
                                        onChange={(e) => setProjectDate(e.target.value)}
                                        className="w-full p-2 text-sm border border-slate-300 rounded focus:border-cyan-500 outline-none"
                                    />
                                </div>
                            </div>
                        </div>

                        <h2 className="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-3">סוג פעילות</h2>
                        <div className="flex gap-3">
                            {['B2B', 'B2C'].map(type => (
                                <button
                                    key={type}
                                    onClick={() => handleBusinessTypeChange(type)}
                                    className={`
                                        flex-1 py-3 rounded-lg border-2 text-center font-bold transition-all
                                        ${businessType === type 
                                            ? 'border-cyan-500 bg-cyan-50 text-cyan-900 shadow-sm' 
                                            : 'border-slate-200 text-slate-400 hover:border-slate-300'}
                                    `}
                                >
                                    {type === 'B2B' ? 'סיטונאות והפצה (B2B)' : 'קמעונאות (B2C)'}
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Modules List */}
                    <div className="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-50/50">
                        {currentModules.map(module => {
                            const ModuleIcon = module.icon;
                            const isExpanded = expandedModules[module.id];
                            
                            const selectedInModule = module.personas.reduce((acc, p) => 
                                acc + p.features.filter(f => selectedFeatures.has(f.id)).length, 0
                            );

                            return (
                                <div key={module.id} className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden mb-4">
                                    {/* Module Header */}
                                    <button 
                                        onClick={() => toggleModule(module.id)}
                                        className="w-full flex items-center justify-between p-4 bg-white hover:bg-slate-50 transition-colors"
                                    >
                                        <div className="flex items-center gap-3">
                                            <div className={`p-2 rounded-lg ${selectedInModule > 0 ? 'bg-cyan-100 text-cyan-700' : 'bg-slate-100 text-slate-500'}`}>
                                                <ModuleIcon size={20} />
                                            </div>
                                            <div className="text-right">
                                                <span className="block font-bold text-slate-800">{module.name}</span>
                                                {selectedInModule > 0 && (
                                                    <span className="text-xs text-cyan-600 font-medium">{selectedInModule} פיצ'רים נבחרו</span>
                                                )}
                                            </div>
                                        </div>
                                        <Icons.ChevronDown size={20} className={`text-slate-400 transition-transform ${isExpanded ? 'rotate-180' : ''}`} />
                                    </button>

                                    {/* Personas & Features */}
                                    {isExpanded && (
                                        <div className="border-t border-slate-100">
                                            {module.personas.map((persona, idx) => (
                                                <div key={persona.id} className={`${idx > 0 ? 'border-t border-slate-100' : ''}`}>
                                                    <div className="px-4 py-2 bg-slate-50 text-xs font-bold text-slate-500 uppercase tracking-wide">
                                                        {persona.name}
                                                    </div>
                                                    <div className="p-3">
                                                        {persona.features.map(feature => {
                                                            const isDisabled = feature.conflicts?.some(conflictId => selectedFeatures.has(conflictId));
                                                            return (
                                                                <FeatureItem 
                                                                    key={feature.id}
                                                                    feature={feature}
                                                                    isSelected={selectedFeatures.has(feature.id)}
                                                                    isDisabled={isDisabled}
                                                                    onToggle={(id) => toggleFeature(id, feature.conflicts)}
                                                                />
                                                            );
                                                        })}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                </div>

                {/* LEFT PANEL: PREVIEW (Output) */}
                <div className="w-1/2 bg-slate-100 flex flex-col relative print-content">
                    
                    {/* View Toggle */}
                    <div className="absolute top-4 left-4 z-20 flex bg-white rounded-lg p-1 shadow-md border border-slate-200 no-print">
                        <button 
                            onClick={() => setViewMode('SOW')}
                            className={`px-4 py-1.5 text-sm rounded-md font-medium transition-all ${viewMode === 'SOW' ? 'bg-slate-800 text-white shadow-sm' : 'text-slate-500 hover:text-slate-800'}`}
                        >
                            <Icons.FileText size={16} className="inline ml-2" />
                            SOW
                        </button>
                        <button 
                            onClick={() => setViewMode('TECH')}
                            className={`px-4 py-1.5 text-sm rounded-md font-medium transition-all ${viewMode === 'TECH' ? 'bg-cyan-600 text-white shadow-sm' : 'text-slate-500 hover:text-slate-800'}`}
                        >
                            <Icons.Code size={16} className="inline ml-2" />
                            Tech Spec
                        </button>
                    </div>

                    {/* Document Content */}
                    <div className="flex-1 overflow-y-auto p-12 print-content">
                        <div className="max-w-3xl mx-auto bg-white min-h-[800px] shadow-lg rounded-sm p-12 relative">
                            
                            {/* Placeholder when empty */}
                            {selectedFeatures.size === 0 && (
                                <div className="absolute inset-0 flex flex-col items-center justify-center text-slate-300 pointer-events-none no-print">
                                    <Icons.LayoutDashboard size={64} className="mb-4 opacity-50" />
                                    <p className="text-lg font-medium">התחל לסמן מודולים להצגת המסמך</p>
                                </div>
                            )}

                            {viewMode === 'SOW' ? (
                                <div className="prose prose-slate max-w-none text-right" dir="rtl">
                                    {/* SOW Header - Dynamic */}
                                    <div className="border-b-2 border-slate-900 pb-6 mb-8 break-inside-avoid">
                                        <div className="flex justify-between items-start">
                                            <div>
                                                <h1 className="text-3xl font-black text-slate-900 m-0">נספח תכולה (SOW)</h1>
                                                <p className="text-slate-500 mt-2 text-lg">פלטפורמת ONEFLOW 360 - אפיון פרויקט {businessType}</p>
                                            </div>
                                            <div className="text-left text-sm text-slate-500 bg-slate-50 p-3 rounded border border-slate-100">
                                                <div className="font-bold text-slate-900 text-base mb-1">{clientName || 'שם הלקוח...'}</div>
                                                <div className="flex items-center gap-2">
                                                    <span>{projectDate}</span>
                                                    <span className="text-xs text-slate-300">|</span>
                                                    <span>גרסה 2.0</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* SOW Body */}
                                    {currentModules.map(module => {
                                        // Filter selected features for this module
                                        const moduleFeatures = [];
                                        module.personas.forEach(p => {
                                            p.features.forEach(f => {
                                                if (selectedFeatures.has(f.id)) {
                                                    moduleFeatures.push(f);
                                                }
                                            });
                                        });

                                        if (moduleFeatures.length === 0) return null;

                                        return (
                                            <div key={module.id} className="mb-8 break-inside-avoid">
                                                <h3 className="text-xl font-bold text-cyan-700 border-r-4 border-cyan-500 pr-3 mb-4">
                                                    {module.name}
                                                </h3>
                                                <ul className="space-y-4 list-none p-0">
                                                    {moduleFeatures.map(f => (
                                                        <li key={f.id} className="bg-slate-50 p-4 rounded-lg border border-slate-100 break-inside-avoid">
                                                            <span className="block font-bold text-slate-900 mb-1">{f.name}</span>
                                                            <span className="text-slate-600 leading-relaxed">{f.sow}</span>
                                                        </li>
                                                    ))}
                                                </ul>
                                            </div>
                                        );
                                    })}
                                </div>
                            ) : (
                                <div className="font-mono text-sm text-left" dir="ltr">
                                     {/* Tech Header */}
                                     <div className="border-b border-slate-200 pb-4 mb-6 flex justify-between items-center" dir="rtl">
                                        <div>
                                            <h2 className="text-2xl font-bold text-slate-800">מפרט טכני</h2>
                                            <p className="text-slate-500">System Manifest & API Requirements</p>
                                        </div>
                                        <div className="text-right">
                                             <div className="font-bold text-slate-800">{clientName}</div>
                                             <div className="text-xs text-slate-400">{projectDate}</div>
                                        </div>
                                    </div>

                                    {/* API List */}
                                    <div className="mb-8">
                                        <h4 className="text-slate-400 font-bold uppercase tracking-wider mb-3">Required Endpoints</h4>
                                        {stats.apiCount > 0 ? (
                                            <div className="bg-slate-900 rounded-lg p-4 overflow-x-auto">
                                                {stats.selectedList
                                                    .filter(f => f.tech && !f.tech.includes('Middleware') && !f.tech.includes('Algorithm'))
                                                    .map(f => (
                                                        <div key={f.id} className="flex items-center gap-3 mb-2 last:mb-0">
                                                            <span className={`text-xs font-bold px-1.5 py-0.5 rounded ${
                                                                f.tech.startsWith('GET') ? 'bg-blue-500/20 text-blue-400' : 
                                                                f.tech.startsWith('POST') ? 'bg-green-500/20 text-green-400' : 'bg-purple-500/20 text-purple-400'
                                                            }`}>
                                                                {f.tech.split(' ')[0]}
                                                            </span>
                                                            <span className="text-slate-300">{f.tech.split(' ')[1] || f.tech}</span>
                                                            <span className="text-slate-600 text-xs ml-auto">// {f.name}</span>
                                                        </div>
                                                    ))
                                                }
                                            </div>
                                        ) : (
                                            <p className="text-slate-400 italic">No API integrations required yet.</p>
                                        )}
                                    </div>

                                    {/* JSON Dump */}
                                    <div>
                                        <h4 className="text-slate-400 font-bold uppercase tracking-wider mb-3">System Manifest</h4>
                                        <pre className="bg-slate-50 border border-slate-200 rounded-lg p-4 text-slate-700 overflow-x-auto whitespace-pre-wrap">
                                            {techSpecJson}
                                        </pre>
                                    </div>
                                </div>
                            )}

                        </div>
                    </div>

                    {/* Bottom Dashboard */}
                    <div className="bg-white border-t border-slate-200 p-4 shrink-0 flex items-center justify-between shadow-[0_-5px_15px_rgba(0,0,0,0.05)] z-20 no-print">
                        <div className="flex gap-8">
                            <div className="flex flex-col">
                                <span className="text-xs text-slate-400 font-medium uppercase">פיצ'רים שנבחרו</span>
                                <span className="text-2xl font-bold text-slate-800 leading-none">{stats.featureCount}</span>
                            </div>
                            <div className="flex flex-col border-r border-slate-100 pr-8">
                                <span className="text-xs text-slate-400 font-medium uppercase">ממשקים (API)</span>
                                <span className="text-2xl font-bold text-cyan-600 leading-none">{stats.apiCount}</span>
                            </div>
                        </div>

                        <div className="flex items-center gap-4 pl-4">
                            <div className="text-left">
                                <span className="block text-xs text-slate-400 font-medium uppercase">Complexity Score</span>
                                <span className={`block text-xl font-black ${complexityLevel.color}`}>
                                    {stats.complexity} <span className="text-sm font-normal text-slate-400">/ 100</span>
                                </span>
                            </div>
                            <div className={`px-4 py-2 rounded-lg font-bold border-2 ${complexityLevel.bg} ${complexityLevel.color} border-current opacity-80`}>
                                {complexityLevel.label}
                            </div>
                        </div>
                    </div>

                </div>
              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
